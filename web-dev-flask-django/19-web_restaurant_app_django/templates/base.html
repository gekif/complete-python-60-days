<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Restaurant Menu</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #f8f9fa, #eef2f7);
        }

        .navbar {
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
        }

        .nav-link {
            font-weight: 500;
        }

        .nav-link:hover {
            color: #0d6efd !important;
        }

        footer {
            background-color: #111;
            color: #aaa;
        }

        footer a {
            color: #fff;
            text-decoration: none;
        }

        footer a:hover {
            color: #0d6efd;
        }
    </style>

</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3">
    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            🍽 FineTaste
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}fw-bold text-primary{% endif %}"
                       href="{% url 'home' %}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if 'about' in request.path %}fw-bold text-primary{% endif %}"
                       href="{% url 'about' %}">
                        About
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- ================= CONTENT ================= -->
<main class="min-vh-100">
    {% block content %}
    {% endblock content %}
</main>

<!-- ================= FOOTER ================= -->
<footer class="mt-5 pt-4 pb-3">
    <div class="container text-center">

        <h5 class="fw-bold text-white">FineTaste Restaurant</h5>
        <p class="small">
            Serving happiness on every plate 🍽
        </p>

        <hr class="bg-secondary w-25 mx-auto">

        <p class="small mb-0">
            © 2026 FineTaste. Built with Django & Bootstrap.
        </p>

    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
